services:
  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
